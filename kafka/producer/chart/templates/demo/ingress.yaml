apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.demo.image.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.demo.image.name }}-service
                port:
                  number: 8080