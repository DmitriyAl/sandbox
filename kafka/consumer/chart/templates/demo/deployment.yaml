apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.demo.image.name }}
spec:
  replicas: 12
  selector:
    matchLabels:
      app: {{ .Values.demo.image.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.demo.image.name }}
    spec:
      containers:
        - name: {{ .Values.demo.image.name }}
          image: "{{ .Values.docker.repository }}/{{ .Values.demo.image.name }}:{{ .Values.demo.image.tag }}"
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "768Mi"   # Просим 256 мегабайт памяти
              cpu: "200m"       # Просим 200 миллипроцессоров (0.2 ядра)
            limits:
              memory: "768Mi"   # Ограничиваем 512 мегабайтами (жесткое ограничение)
              cpu: "500m"
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=75.0 -XX:+UseG1GC"
            - name: DB_HOST
              value: "demo-postgresql.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-postgresql
                  key: postgres-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: my-kafka-release:9092
            - name: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              value: org.apache.kafka.common.security.plain.PlainLoginModule required username="user" password="test";