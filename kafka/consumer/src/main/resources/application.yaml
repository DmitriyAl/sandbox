spring:
  application:
    name: kafka-consumer-demo
  kafka:
    bootstrap-servers: 10.99.100.217:9092
    consumer:
      group-id: my-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      max-poll-records: 500
      properties:
        max.partition.fetch.bytes: 10485760  # 10MB на партицию
    listener:
      ack-mode: manual_immediate
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="hOKPRLqhHH";

# ??????????? ??? ???????
logging:
  level:
    org.springframework.kafka: INFO
    org.apache.kafka: INFO

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
      base-path: /actuator  # ?? ?????????, ?? ????? ??????? ????
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true