server:
  port: 8081

spring:
  application:
    name: target-app
  data:
    redis:
      host: localhost
      port: 6379

security:
  internal-api-key: ${INTERNAL_API_KEY:secret-api-key}
  token-ttl-seconds: 300   # 5 ?????
  allowed-redirect-prefixes:
    - /old/orders
    - /old/profile
    - /old/reports